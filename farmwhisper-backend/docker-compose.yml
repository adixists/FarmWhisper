version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: farmwhisper-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  farmwhisper-backend:
    build: .
    container_name: farmwhisper-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/farmwhisper?authSource=admin
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    depends_on:
      - mongodb
    volumes:
      - .:/app

volumes:
  mongodb_data: